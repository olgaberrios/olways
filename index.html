<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Olways</title>
<meta name="theme-color" content="#E8772E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<style>
:root{
  --orange:#E8772E;
  --orange-deep:#C85A1B;
  --cream:#FBF4EA;
  --ink:#2B2420;
  --ink-soft:#6B5F54;
  --blue:#3A5A78;
  --line:#E3D5C2;
  --card:#FFFFFF;
  --shadow: 0 2px 14px rgba(43,36,32,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:40px;
}
h1,h2,h3,.display{
  font-family:'Fraunces',Georgia,'Times New Roman',serif;
}

/* ---------- HEADER ---------- */
header.hero{
  position:relative;
  padding:34px 20px 26px;
  background:linear-gradient(160deg,var(--orange) 0%, var(--orange-deep) 100%);
  color:#fff;
  border-radius:0 0 28px 28px;
  overflow:hidden;
}
header.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 85% 10%, rgba(255,255,255,0.16), transparent 55%);
  pointer-events:none;
}
.hero-top{
  display:flex;
  align-items:center;
  gap:14px;
  position:relative;
  z-index:1;
}
.duck-clock{
  width:58px;height:58px;flex:none;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.18));
  animation: tickTock 4s ease-in-out infinite;
}
@keyframes tickTock{
  0%,100%{ transform: rotate(-4deg); }
  50%{ transform: rotate(4deg); }
}
@media (prefers-reduced-motion: reduce){
  .duck-clock{animation:none;}
}
.brand-text h1{
  margin:0;
  font-size:30px;
  font-weight:600;
  letter-spacing:-0.02em;
  line-height:1;
}
.brand-text p{
  margin:3px 0 0;
  font-size:13px;
  opacity:0.88;
  font-weight:500;
}
.hero-stats{
  position:relative;
  z-index:1;
  margin-top:18px;
  display:flex;
  gap:18px;
  font-size:12.5px;
  opacity:0.92;
}
.hero-stats b{font-size:16px; display:block; font-family:'Fraunces',serif;}

/* ---------- TOOLBAR / FILTERS ---------- */
.toolbar{
  margin:18px 16px 0;
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
}
.toolbar-row{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.toolbar-row:last-child{margin-bottom:0;}
.seg{
  display:flex;
  background:var(--cream);
  border-radius:12px;
  padding:3px;
  flex:1;
  gap:2px;
}
.seg button{
  flex:1;
  border:none;
  background:none;
  padding:8px 4px;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
  border-radius:9px;
  cursor:pointer;
  font-family:inherit;
}
.seg button.active{
  background:var(--orange);
  color:#fff;
}
.range-inputs{
  display:flex;
  gap:8px;
  align-items:center;
  flex:1;
}
.range-inputs select, .range-inputs input{
  flex:1;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:8px 6px;
  font-size:13px;
  font-family:inherit;
  background:#fff;
  color:var(--ink);
  min-width:0;
}
.type-chips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.chip{
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:20px;
  padding:6px 12px 6px 8px;
  font-size:12.5px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  color:var(--ink-soft);
  white-space:nowrap;
}
.chip.active{
  background:var(--blue);
  border-color:var(--blue);
  color:#fff;
}
.chip-emoji{font-size:14px;}
.toolbar-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--line);
}
.link-btn{
  border:none;
  background:none;
  color:var(--blue);
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
  padding:4px 0;
}
.count-pill{
  font-size:12px;
  color:var(--ink-soft);
  font-weight:600;
}

/* ---------- TIMELINE ---------- */
.timeline-wrap{
  margin:20px 16px 0;
  position:relative;
}
.timeline-wrap::before{
  content:"";
  position:absolute;
  left:27px;
  top:6px;
  bottom:6px;
  width:3px;
  background:linear-gradient(to bottom, var(--orange), var(--blue));
  border-radius:3px;
  opacity:0.35;
}
.year-group{
  position:relative;
  margin-bottom:22px;
}
.year-label{
  position:relative;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
  z-index:1;
}
.year-dot{
  width:56px;height:56px;
  border-radius:50%;
  background:var(--ink);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:16px;
  line-height:1;
  box-shadow:0 3px 8px rgba(0,0,0,0.18);
  flex:none;
}
.year-dot span{
  font-size:9px;
  font-family:'Inter',sans-serif;
  font-weight:600;
  opacity:0.65;
  margin-top:1px;
}
.year-meta{
  font-size:12px;
  color:var(--ink-soft);
  font-weight:600;
}
.event-card{
  margin-left:68px;
  background:var(--card);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:8px;
  box-shadow:var(--shadow);
  display:flex;
  gap:10px;
  align-items:flex-start;
  cursor:pointer;
  border-left:4px solid transparent;
}
.event-card:active{
  transform:scale(0.985);
}
.event-emoji{
  font-size:22px;
  flex:none;
  margin-top:1px;
}
.event-body{flex:1; min-width:0;}
.event-title{
  font-weight:600;
  font-size:14.5px;
  margin:0 0 2px;
  color:var(--ink);
}
.event-meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.event-meta b{font-weight:600;}

.empty-state{
  text-align:center;
  padding:50px 24px;
  color:var(--ink-soft);
}
.empty-state .e{font-size:42px; display:block; margin-bottom:10px;}
.empty-state p{font-size:14px; margin:4px 0;}

/* ---------- FAB ---------- */
.fab{
  position:fixed;
  bottom:22px;
  right:18px;
  width:58px;height:58px;
  border-radius:50%;
  background:var(--orange);
  color:#fff;
  border:none;
  font-size:28px;
  box-shadow:0 6px 18px rgba(232,119,46,0.45);
  cursor:pointer;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:0;
}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(43,36,32,0.45);
  z-index:100;
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.overlay.show{display:flex;}
.modal{
  background:var(--cream);
  width:100%;
  max-width:480px;
  border-radius:22px 22px 0 0;
  padding:20px 18px 26px;
  max-height:88vh;
  overflow-y:auto;
  animation: slideUp 0.22s ease-out;
}
@keyframes slideUp{from{transform:translateY(30px); opacity:0.4;} to{transform:translateY(0); opacity:1;}}
.modal h2{
  margin:0 0 16px;
  font-size:21px;
}
.field{margin-bottom:13px;}
.field label{
  display:block;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
  margin-bottom:5px;
}
.field input, .field select, .field textarea{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:10px 11px;
  font-size:14.5px;
  font-family:inherit;
  background:#fff;
  color:var(--ink);
}
.field textarea{resize:vertical; min-height:50px;}
.type-picker{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.type-pick-chip{
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:20px;
  padding:7px 12px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
}
.type-pick-chip.active{
  background:var(--orange);
  border-color:var(--orange);
  color:#fff;
}
.modal-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}
.btn{
  flex:1;
  border:none;
  border-radius:12px;
  padding:13px;
  font-size:14.5px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}
.btn-primary{background:var(--orange); color:#fff;}
.btn-secondary{background:#fff; color:var(--ink-soft); border:1.5px solid var(--line);}
.btn-danger{background:#fff; color:#C0392B; border:1.5px solid #F0C4BC;}
.btn-small{
  padding:9px 14px;
  font-size:13px;
  flex:none;
}

.manage-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}
.manage-row:last-child{border-bottom:none;}
.manage-left{display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600;}
.manage-actions{display:flex; gap:6px;}
.icon-btn{
  border:none;
  background:var(--cream);
  width:32px;height:32px;
  border-radius:9px;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sync-banner{
  margin:14px 16px 0;
  background:#fff;
  border-radius:14px;
  padding:12px 14px;
  font-size:12.5px;
  color:var(--ink-soft);
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:10px;
}
.sync-banner button{
  border:none;
  background:var(--blue);
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:7px 12px;
  border-radius:9px;
  cursor:pointer;
  flex:none;
}
.toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:var(--ink);
  color:#fff;
  padding:10px 18px;
  border-radius:30px;
  font-size:13px;
  font-weight:600;
  z-index:200;
  opacity:0;
  transition:opacity 0.25s, transform 0.25s;
  pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <svg class="duck-clock" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="34" r="22" fill="#FFF6E8" stroke="#2B2420" stroke-width="2.5"/>
      <circle cx="32" cy="34" r="2.6" fill="#2B2420"/>
      <line x1="32" y1="34" x2="32" y2="21" stroke="#2B2420" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="34" x2="41" y2="38" stroke="#2B2420" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="32" cy="13" r="3" fill="#2B2420"/>
      <circle cx="14" cy="34" r="3" fill="#2B2420"/>
      <circle cx="50" cy="34" r="3" fill="#2B2420"/>
      <circle cx="32" cy="55" r="3" fill="#2B2420"/>
      <path d="M44 24c4-3 9-2 10 2-2 3-7 4-10 1z" fill="#E8772E" stroke="#2B2420" stroke-width="2"/>
      <ellipse cx="22" cy="30" rx="2" ry="2.6" fill="#2B2420"/>
    </svg>
    <div class="brand-text">
      <h1>Olways</h1>
      <p>Tu línea temporal vital</p>
    </div>
  </div>
  <div class="hero-stats" id="heroStats"></div>
</header>

<div class="sync-banner" id="syncBanner" style="display:none;">
  <span id="syncText">Conecta un Gist para sincronizar entre dispositivos.</span>
  <button onclick="openSyncModal()">Configurar</button>
</div>

<div class="toolbar">
  <div class="toolbar-row">
    <div class="seg" id="modeSeg">
      <button data-mode="all" class="active">Todo</button>
      <button data-mode="year">Año</button>
      <button data-mode="range">Intervalo</button>
    </div>
  </div>
  <div class="toolbar-row" id="yearRow" style="display:none;">
    <div class="range-inputs">
      <select id="yearSelect"></select>
    </div>
  </div>
  <div class="toolbar-row" id="rangeRow" style="display:none;">
    <div class="range-inputs">
      <input type="number" id="rangeFrom" placeholder="Desde">
      <span style="color:var(--ink-soft); font-size:13px;">–</span>
      <input type="number" id="rangeTo" placeholder="Hasta">
    </div>
  </div>
  <div class="toolbar-row">
    <div class="type-chips" id="typeChips"></div>
  </div>
  <div class="toolbar-row" id="personPlaceRow">
    <div class="range-inputs">
      <input type="text" id="filterPersonInput" placeholder="👤 Persona..." style="flex:1;">
      <input type="text" id="filterPlaceInput" placeholder="📍 Lugar..." style="flex:1;">
    </div>
  </div>
  <div class="toolbar-actions">
    <button class="link-btn" onclick="openTypesModal()">⚙️ Gestionar tipos</button>
    <span class="count-pill" id="countPill"></span>
  </div>
</div>

<div class="timeline-wrap" id="timeline"></div>

<button class="fab" onclick="openEventModal()" aria-label="Añadir evento">+</button>

<!-- EVENT MODAL -->
<div class="overlay" id="eventOverlay">
  <div class="modal">
    <h2 id="eventModalTitle">Nuevo evento</h2>
    <input type="hidden" id="eventId">
    <div class="field">
      <label>Título</label>
      <input type="text" id="fTitulo" placeholder="¿Qué pasó?">
    </div>
    <div class="field">
      <label>Tipo</label>
      <div class="type-picker" id="fTipoPicker"></div>
    </div>
    <div class="field">
      <label>Fecha (o año, o año-mes)</label>
      <input type="text" id="fFecha" placeholder="1996-09-17, 1992-05 ó 1992">
    </div>
    <div class="field">
      <label>Lugar</label>
      <input type="text" id="fLugar" placeholder="Madrid">
    </div>
    <div class="field">
      <label>Personas relacionadas</label>
      <input type="text" id="fProtas" placeholder="Mamá, Eva...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEventModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvent()">Guardar</button>
    </div>
    <div class="modal-actions" id="deleteRow" style="display:none;">
      <button class="btn btn-danger" onclick="deleteEvent()">Eliminar evento</button>
    </div>
  </div>
</div>

<!-- TYPES MODAL -->
<div class="overlay" id="typesOverlay">
  <div class="modal">
    <h2>Tipos de evento</h2>
    <div id="typesList"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="openNewTypeModal()">+ Nuevo tipo</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTypesModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- TYPE EDIT MODAL -->
<div class="overlay" id="typeEditOverlay">
  <div class="modal">
    <h2 id="typeEditTitle">Nuevo tipo</h2>
    <input type="hidden" id="typeId">
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="tNombre" placeholder="Ej. Logro deportivo">
    </div>
    <div class="field">
      <label>Emoji</label>
      <input type="text" id="tEmoji" placeholder="🏆" maxlength="4">
    </div>
    <div class="field">
      <label>Color</label>
      <input type="color" id="tColor" style="height:44px; padding:4px;">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTypeEditModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveType()">Guardar</button>
    </div>
  </div>
</div>

<!-- SYNC MODAL -->
<div class="overlay" id="syncOverlay">
  <div class="modal">
    <h2>Sincronización con GitHub Gist</h2>
    <div class="field">
      <label>Token de GitHub (con permiso "gist")</label>
      <input type="password" id="ghToken" placeholder="ghp_...">
    </div>
    <div class="field">
      <label>Gist ID (déjalo vacío para crear uno nuevo)</label>
      <input type="text" id="ghGistId" placeholder="abc123...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSyncModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="connectSync()">Conectar</button>
    </div>
    <div class="modal-actions" id="syncedActions" style="display:none;">
      <button class="btn btn-secondary" onclick="pullFromGist()">⬇️ Traer de Gist</button>
      <button class="btn btn-primary" onclick="pushToGist()">⬆️ Subir a Gist</button>
    </div>
    <div class="modal-actions" id="disconnectRow" style="display:none;">
      <button class="btn btn-danger" onclick="disconnectSync()">Desconectar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
/* ============ ESTADO ============ */
let EVENTS = [];
let TYPES = [];
let filterMode = 'all';
let filterYear = null;
let filterRangeFrom = null;
let filterRangeTo = null;
let activeTypeFilters = new Set();
let filterPerson = '';
let filterPlace = '';
let editingTypeForEvent = null;

const LS_KEY_EVENTS = 'olways_events';
const LS_KEY_TYPES = 'olways_types';
const LS_KEY_GH_TOKEN = 'olways_gh_token';
const LS_KEY_GH_GIST = 'olways_gh_gist';

function loadState(){
  const e = localStorage.getItem(LS_KEY_EVENTS);
  const t = localStorage.getItem(LS_KEY_TYPES);
  EVENTS = e ? JSON.parse(e) : JSON.parse(JSON.stringify(DEFAULT_EVENTS));
  TYPES = t ? JSON.parse(t) : JSON.parse(JSON.stringify(DEFAULT_TYPES));
}

async function autoSyncOnLoad(){
  const { token, gistId } = getGhCreds();
  if(!token || !gistId) return;
  updateSyncBanner('syncing');
  try{
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers:{ 'Authorization':`token ${token}` }
    });
    if(!res.ok){ updateSyncBanner('error'); return; }
    const data = await res.json();
    const eventsContent = data.files['olways-events.json']?.content;
    const typesContent  = data.files['olways-types.json']?.content;
    if(eventsContent) EVENTS = JSON.parse(eventsContent);
    if(typesContent)  TYPES  = JSON.parse(typesContent);
    localStorage.setItem(LS_KEY_EVENTS, JSON.stringify(EVENTS));
    localStorage.setItem(LS_KEY_TYPES,  JSON.stringify(TYPES));
    renderYearSelect();
    renderTypeChips();
    renderHeroStats();
    renderTimeline();
    updateSyncBanner('ok');
  } catch(e){
    updateSyncBanner('error');
  }
}
function saveState(){
  localStorage.setItem(LS_KEY_EVENTS, JSON.stringify(EVENTS));
  localStorage.setItem(LS_KEY_TYPES, JSON.stringify(TYPES));
  // Auto-push al Gist si está configurado (sin bloquear la UI)
  const { token, gistId } = getGhCreds();
  if(token && gistId){
    fetch(`https://api.github.com/gists/${gistId}`, {
      method:'PATCH',
      headers:{ 'Authorization':`token ${token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({
        files: {
          'olways-events.json': { content: JSON.stringify(EVENTS, null, 2) },
          'olways-types.json': { content: JSON.stringify(TYPES, null, 2) }
        }
      })
    }).catch(()=>{}); // silencioso — no interrumpe si falla
  }
}

function typeById(id){ return TYPES.find(t=>t.id===id) || {emoji:'❔', nombre:id, color:'#999'}; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============ RENDER TOOLBAR ============ */
function renderYearSelect(){
  const sel = document.getElementById('yearSelect');
  const years = [...new Set(EVENTS.map(e=>e.anio))].sort((a,b)=>b-a);
  sel.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

function renderTypeChips(){
  const wrap = document.getElementById('typeChips');
  wrap.innerHTML = TYPES.map(t=>`
    <div class="chip ${activeTypeFilters.has(t.id)?'active':''}" data-type="${t.id}" onclick="toggleTypeFilter('${t.id}')">
      <span class="chip-emoji">${t.emoji}</span>${t.nombre}
    </div>
  `).join('');
}
function toggleTypeFilter(id){
  if(activeTypeFilters.has(id)) activeTypeFilters.delete(id);
  else activeTypeFilters.add(id);
  renderTypeChips();
  renderTimeline();
}

document.getElementById('modeSeg').addEventListener('click', (ev)=>{
  const btn = ev.target.closest('button');
  if(!btn) return;
  filterMode = btn.dataset.mode;
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('active', b===btn));
  document.getElementById('yearRow').style.display = filterMode==='year' ? 'flex':'none';
  document.getElementById('rangeRow').style.display = filterMode==='range' ? 'flex':'none';
  renderTimeline();
});
document.getElementById('yearSelect').addEventListener('change', (e)=>{
  filterYear = e.target.value;
  renderTimeline();
});
document.getElementById('rangeFrom').addEventListener('input', (e)=>{ filterRangeFrom = e.target.value; renderTimeline(); });
document.getElementById('rangeTo').addEventListener('input', (e)=>{ filterRangeTo = e.target.value; renderTimeline(); });
document.getElementById('filterPersonInput').addEventListener('input', (e)=>{ filterPerson = e.target.value.trim().toLowerCase(); renderTimeline(); });
document.getElementById('filterPlaceInput').addEventListener('input', (e)=>{ filterPlace = e.target.value.trim().toLowerCase(); renderTimeline(); });

/* ============ TIMELINE ============ */
function getFilteredEvents(){
  let list = [...EVENTS];
  if(filterMode==='year' && filterYear){
    list = list.filter(e=> String(e.anio) === String(filterYear));
  } else if(filterMode==='range'){
    const from = filterRangeFrom ? parseInt(filterRangeFrom) : -Infinity;
    const to = filterRangeTo ? parseInt(filterRangeTo) : Infinity;
    list = list.filter(e=> e.anio >= from && e.anio <= to);
  }
  if(activeTypeFilters.size>0){
    list = list.filter(e=> activeTypeFilters.has(e.tipo));
  }
  if(filterPerson){
    list = list.filter(e=> (e.protas||'').toLowerCase().includes(filterPerson));
  }
  if(filterPlace){
    list = list.filter(e=> (e.lugar||'').toLowerCase().includes(filterPlace));
  }
  // orden: más nuevo primero
  list.sort((a,b)=>{
    if(b.anio !== a.anio) return b.anio - a.anio;
    return (b.fecha||'').localeCompare(a.fecha||'');
  });
  return list;
}

function renderTimeline(){
  const wrap = document.getElementById('timeline');
  const list = getFilteredEvents();
  document.getElementById('countPill').textContent = `${list.length} evento${list.length===1?'':'s'}`;

  if(list.length===0){
    wrap.innerHTML = `<div class="empty-state"><span class="e">🦆</span><p>No hay eventos para este filtro.</p><p>Prueba a ampliar el rango o quitar filtros de tipo.</p></div>`;
    return;
  }

  // agrupar por año
  const groups = {};
  list.forEach(e=>{
    if(!groups[e.anio]) groups[e.anio] = [];
    groups[e.anio].push(e);
  });
  const years = Object.keys(groups).sort((a,b)=>b-a);

  // Año de nacimiento: evento tipo 'nacimiento' más antiguo
  const birthEvent = EVENTS.filter(e=>e.tipo==='nacimiento').sort((a,b)=>a.anio-b.anio)[0];
  const birthYear = birthEvent ? birthEvent.anio : null;
  const currentYear = new Date().getFullYear();

  wrap.innerHTML = years.map(y=>{
    const yInt = parseInt(y);
    const edadBase = birthYear ? (yInt - birthYear) : null;
    const edad = (edadBase !== null && edadBase >= 0) ? edadBase : null;
    const esAhora = yInt === currentYear;
    const edadTxt = edad !== null ? `${edad} años${esAhora ? ' 🎂' : ''}` : '';
    const cards = groups[y].map(e=>{
      const t = typeById(e.tipo);
      const metaParts = [];
      if(e.lugar) metaParts.push(`📍 ${e.lugar}`);
      if(e.protas) metaParts.push(`👤 ${e.protas}`);
      if(e.fecha && e.fecha.length>4) metaParts.push(formatFecha(e.fecha));
      return `
        <div class="event-card" style="border-left-color:${t.color}" onclick="openEventModal('${e.id}')">
          <div class="event-emoji">${t.emoji}</div>
          <div class="event-body">
            <p class="event-title">${escapeHtml(e.titulo)}</p>
            <div class="event-meta">${metaParts.map(m=>`<span>${m}</span>`).join('')}</div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="year-group">
        <div class="year-label">
          <div class="year-dot">${y}${edadTxt?`<span>${edadTxt}</span>`:''}</div>
          <div class="year-meta">${groups[y].length} evento${groups[y].length===1?'':'s'}</div>
        </div>
        ${cards}
      </div>`;
  }).join('');
}

function formatFecha(f){
  const parts = f.split('-');
  if(parts.length===3){
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(parts[2])} ${meses[parseInt(parts[1])-1]}`;
  }
  if(parts.length===2){
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return meses[parseInt(parts[1])-1];
  }
  return '';
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderHeroStats(){
  const years = EVENTS.map(e=>e.anio);
  const min = Math.min(...years);
  const max = Math.max(...years);
  document.getElementById('heroStats').innerHTML = `
    <div><b>${EVENTS.length}</b>hitos</div>
    <div><b>${min}–${max}</b>años cubiertos</div>
    <div><b>${TYPES.length}</b>tipos</div>
  `;
}

/* ============ MODAL EVENTO ============ */
function renderTipoPicker(selected){
  const wrap = document.getElementById('fTipoPicker');
  wrap.innerHTML = TYPES.map(t=>`
    <div class="type-pick-chip ${selected===t.id?'active':''}" data-type="${t.id}" onclick="pickEventType('${t.id}')">
      ${t.emoji} ${t.nombre}
    </div>
  `).join('');
}
function pickEventType(id){
  editingTypeForEvent = id;
  renderTipoPicker(id);
}

function openEventModal(id){
  document.getElementById('eventId').value = id || '';
  if(id){
    const ev = EVENTS.find(e=>e.id===id);
    document.getElementById('eventModalTitle').textContent = 'Editar evento';
    document.getElementById('fTitulo').value = ev.titulo;
    document.getElementById('fFecha').value = ev.fecha;
    document.getElementById('fLugar').value = ev.lugar || '';
    document.getElementById('fProtas').value = ev.protas || '';
    editingTypeForEvent = ev.tipo;
    document.getElementById('deleteRow').style.display = 'flex';
  } else {
    document.getElementById('eventModalTitle').textContent = 'Nuevo evento';
    document.getElementById('fTitulo').value = '';
    document.getElementById('fFecha').value = '';
    document.getElementById('fLugar').value = '';
    document.getElementById('fProtas').value = '';
    editingTypeForEvent = TYPES[0]?.id;
    document.getElementById('deleteRow').style.display = 'none';
  }
  renderTipoPicker(editingTypeForEvent);
  document.getElementById('eventOverlay').classList.add('show');
}
function closeEventModal(){
  document.getElementById('eventOverlay').classList.remove('show');
}

function parseFechaInput(raw){
  raw = raw.trim();
  let anio, edad = null;
  if(/^\d{4}$/.test(raw)){
    anio = parseInt(raw);
  } else if(/^\d{4}-\d{2}$/.test(raw)){
    anio = parseInt(raw.slice(0,4));
  } else if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
    anio = parseInt(raw.slice(0,4));
  } else {
    // intenta extraer un año de 4 dígitos de cualquier texto
    const m = raw.match(/\d{4}/);
    anio = m ? parseInt(m[0]) : new Date().getFullYear();
  }
  return { fecha: raw, anio };
}

function saveEvent(){
  const id = document.getElementById('eventId').value;
  const titulo = document.getElementById('fTitulo').value.trim();
  const fechaRaw = document.getElementById('fFecha').value.trim();
  const lugar = document.getElementById('fLugar').value.trim();
  const protas = document.getElementById('fProtas').value.trim();

  if(!titulo){ showToast('Ponle un título al evento'); return; }
  if(!fechaRaw){ showToast('Indica una fecha o año'); return; }
  if(!editingTypeForEvent){ showToast('Elige un tipo'); return; }

  const { fecha, anio } = parseFechaInput(fechaRaw);

  if(id){
    const ev = EVENTS.find(e=>e.id===id);
    Object.assign(ev, { titulo, fecha, anio, lugar, protas, tipo: editingTypeForEvent });
  } else {
    EVENTS.push({
      id: 'e' + Date.now(),
      titulo, fecha, anio, lugar, protas,
      tipo: editingTypeForEvent,
      edad: null
    });
  }
  saveState();
  renderYearSelect();
  renderHeroStats();
  renderTimeline();
  closeEventModal();
  showToast('Evento guardado');
}

function deleteEvent(){
  const id = document.getElementById('eventId').value;
  if(!confirm('¿Eliminar este evento?')) return;
  EVENTS = EVENTS.filter(e=>e.id!==id);
  saveState();
  renderYearSelect();
  renderHeroStats();
  renderTimeline();
  closeEventModal();
  showToast('Evento eliminado');
}

/* ============ MODAL TIPOS ============ */
function openTypesModal(){
  renderTypesList();
  document.getElementById('typesOverlay').classList.add('show');
}
function closeTypesModal(){
  document.getElementById('typesOverlay').classList.remove('show');
}
function renderTypesList(){
  const wrap = document.getElementById('typesList');
  wrap.innerHTML = TYPES.map(t=>{
    const count = EVENTS.filter(e=>e.tipo===t.id).length;
    return `
    <div class="manage-row">
      <div class="manage-left"><span>${t.emoji}</span> ${t.nombre} <span style="color:var(--ink-soft); font-weight:500; font-size:12px;">(${count})</span></div>
      <div class="manage-actions">
        <button class="icon-btn" onclick="openTypeEditModal('${t.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteType('${t.id}')">🗑️</button>
      </div>

function deleteType(id){
  const count = EVENTS.filter(e=>e.tipo===id).length;
  if(count>0){
    showToast(`No se puede borrar: ${count} evento(s) lo usan`);
    return;
  }
  if(!confirm('¿Eliminar este tipo?')) return;
  TYPES = TYPES.filter(t=>t.id!==id);
  saveState();
  renderTypesList();
  renderTypeChips();
  renderHeroStats();
  showToast('Tipo eliminado');
}

function openNewTypeModal(){
  document.getElementById('typeId').value = '';
  document.getElementById('typeEditTitle').textContent = 'Nuevo tipo';
  document.getElementById('tNombre').value = '';
  document.getElementById('tEmoji').value = '✨';
  document.getElementById('tColor').value = '#E8772E';
  document.getElementById('typeEditOverlay').classList.add('show');
}
function openTypeEditModal(id){
  const t = TYPES.find(x=>x.id===id);
  document.getElementById('typeId').value = id;
  document.getElementById('typeEditTitle').textContent = 'Editar tipo';
  document.getElementById('tNombre').value = t.nombre;
  document.getElementById('tEmoji').value = t.emoji;
  document.getElementById('tColor').value = t.color;
  document.getElementById('typeEditOverlay').classList.add('show');
}
function closeTypeEditModal(){
  document.getElementById('typeEditOverlay').classList.remove('show');
}
function saveType(){
  const id = document.getElementById('typeId').value;
  const nombre = document.getElementById('tNombre').value.trim();
  const emoji = document.getElementById('tEmoji').value.trim() || '✨';
  const color = document.getElementById('tColor').value;
  if(!nombre){ showToast('Ponle un nombre al tipo'); return; }

  if(id){
    const t = TYPES.find(x=>x.id===id);
    Object.assign(t, { nombre, emoji, color });
  } else {
    const newId = 'tipo-' + Date.now();
    TYPES.push({ id:newId, nombre, emoji, color });
  }
  saveState();
  renderTypesList();
  renderTypeChips();
  renderTipoPicker(editingTypeForEvent);
  renderHeroStats();
  closeTypeEditModal();
  showToast('Tipo guardado');
}

/* ============ SYNC CON GITHUB GIST ============ */
function getGhCreds(){
  return {
    token: localStorage.getItem(LS_KEY_GH_TOKEN),
    gistId: localStorage.getItem(LS_KEY_GH_GIST)
  };
}
function updateSyncBanner(estado){
  // estado: 'noconfig' | 'syncing' | 'ok' | 'error'
  const { token, gistId } = getGhCreds();
  const banner = document.getElementById('syncBanner');
  const text = document.getElementById('syncText');
  banner.style.display = 'flex';
  if(!token || !gistId){
    text.textContent = 'Conecta un Gist para sincronizar entre dispositivos.';
  } else if(estado === 'ok'){
    text.textContent = '✅ Sincronizado';
  } else if(estado === 'error'){
    text.textContent = '⚠️ Sin conexión – datos locales';
  } else {
    text.textContent = '☁️ Sincronizando...';
  }
}

function setSyncBannerOk(){
  updateSyncBanner('ok');
}
function openSyncModal(){
  const { token, gistId } = getGhCreds();
  document.getElementById('ghToken').value = token || '';
  document.getElementById('ghGistId').value = gistId || '';
  document.getElementById('syncedActions').style.display = (token && gistId) ? 'flex':'none';
  document.getElementById('disconnectRow').style.display = (token && gistId) ? 'flex':'none';
  document.getElementById('syncOverlay').classList.add('show');
}
function closeSyncModal(){
  document.getElementById('syncOverlay').classList.remove('show');
}
function disconnectSync(){
  localStorage.removeItem(LS_KEY_GH_TOKEN);
  localStorage.removeItem(LS_KEY_GH_GIST);
  updateSyncBanner('noconfig');
  closeSyncModal();
  showToast('Desconectado de Gist');
}

async function connectSync(){
  const token = document.getElementById('ghToken').value.trim();
  let gistId = document.getElementById('ghGistId').value.trim();
  if(!token){ showToast('Pega tu token de GitHub'); return; }

  try{
    if(!gistId){
      // crear gist nuevo
      const res = await fetch('https://api.github.com/gists', {
        method:'POST',
        headers:{ 'Authorization':`token ${token}`, 'Content-Type':'application/json' },
        body: JSON.stringify({
          description: 'Olways - datos',
          public: false,
          files: {
            'olways-events.json': { content: JSON.stringify(EVENTS, null, 2) },
            'olways-types.json': { content: JSON.stringify(TYPES, null, 2) }
          }
        })
      });
      if(!res.ok) throw new Error('No se pudo crear el Gist');
      const data = await res.json();
      gistId = data.id;
      document.getElementById('ghGistId').value = gistId;
    }
    localStorage.setItem(LS_KEY_GH_TOKEN, token);
    localStorage.setItem(LS_KEY_GH_GIST, gistId);
    document.getElementById('syncedActions').style.display = 'flex';
    document.getElementById('disconnectRow').style.display = 'flex';
    closeSyncModal();
    showToast('Conectado a Gist');
    autoSyncOnLoad(); // pull inmediato al conectar
  } catch(err){
    showToast('Error: ' + err.message);
  }
}

async function pullFromGist(){
  const { token, gistId } = getGhCreds();
  if(!token || !gistId){ showToast('Conecta primero un Gist'); return; }
  try{
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers:{ 'Authorization':`token ${token}` }
    });
    if(!res.ok) throw new Error('No se pudo leer el Gist');
    const data = await res.json();
    const eventsContent = data.files['olways-events.json']?.content;
    const typesContent = data.files['olways-types.json']?.content;
    if(eventsContent) EVENTS = JSON.parse(eventsContent);
    if(typesContent) TYPES = JSON.parse(typesContent);
    saveState();
    renderYearSelect();
    renderTypeChips();
    renderHeroStats();
    renderTimeline();
    closeSyncModal();
    showToast('Datos traídos del Gist');
  } catch(err){
    showToast('Error: ' + err.message);
  }
}

async function pushToGist(){
  const { token, gistId } = getGhCreds();
  if(!token || !gistId){ showToast('Conecta primero un Gist'); return; }
  try{
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method:'PATCH',
      headers:{ 'Authorization':`token ${token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({
        files: {
          'olways-events.json': { content: JSON.stringify(EVENTS, null, 2) },
          'olways-types.json': { content: JSON.stringify(TYPES, null, 2) }
        }
      })
    });
    if(!res.ok) throw new Error('No se pudo subir al Gist');
    closeSyncModal();
    showToast('Datos subidos al Gist');
  } catch(err){
    showToast('Error: ' + err.message);
  }
}

    navigator.serviceWorker.register('sw.js').catch(()=>{});
